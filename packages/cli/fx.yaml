name: fx
version: 36.0.2
commit: efa0931f67928d9a11ea1c60c6c7ab75381da247
description: Terminal JSON viewer & processor
homepage: https://github.com/antonmedv/fx
license: MIT
maintainer: antonmedv
updated_at: "2025-05-17T00:02:03Z"
tags:
    - cli
    - json
    - terminal
    - viewer
install:
    source:
        type: git
        url: https://github.com/antonmedv/fx.git
        ref: main
    steps:
        - git clone https://github.com/antonmedv/fx.git .
        - go build -o bin/fx
    binaries:
        - bin/fx
    additional-config:
        - filename: config.sh
          content: |
            #!/usr/bin/env bash

            export FX_SHOW_SIZE=true
            export FX_THEME=3
