name: fx
version: 38.0.0
commit: cf618365dbb37de7d8578959cf2db684f6bc2fe0
description: Terminal JSON viewer & processor
homepage: https://github.com/antonmedv/fx
license: MIT
maintainer: antonmedv
updated_at: "2025-08-03T00:22:00Z"
tags:
    - cli
    - json
    - terminal
    - viewer
install:
    source:
        type: git
        url: https://github.com/antonmedv/fx.git
        ref: main
    steps:
        - git clone https://github.com/antonmedv/fx.git .
        - go build -o bin/fx
    binaries:
        - bin/fx
    additional-config:
        - filename: config.sh
          content: |
            #!/usr/bin/env bash

            export FX_SHOW_SIZE=true
            export FX_THEME=3
