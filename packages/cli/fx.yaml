name: fx
version: 38.0.0
commit: 31b34bfa1d473cf4895bfe59e7244ae1191f8426
description: Terminal JSON viewer & processor
homepage: https://github.com/antonmedv/fx
license: MIT
maintainer: antonmedv
updated_at: "2025-07-31T00:19:35Z"
tags:
    - cli
    - json
    - terminal
    - viewer
install:
    source:
        type: git
        url: https://github.com/antonmedv/fx.git
        ref: main
    steps:
        - git clone https://github.com/antonmedv/fx.git .
        - go build -o bin/fx
    binaries:
        - bin/fx
    additional-config:
        - filename: config.sh
          content: |
            #!/usr/bin/env bash

            export FX_SHOW_SIZE=true
            export FX_THEME=3
