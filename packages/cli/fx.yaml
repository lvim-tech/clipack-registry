name: fx
version: 39.0.2
commit: f8406ef237d98d175c8f3449108a21a8a76b9772
description: Terminal JSON viewer & processor
homepage: https://github.com/antonmedv/fx
license: MIT
maintainer: antonmedv
updated_at: "2025-08-22T00:17:44Z"
tags:
    - cli
    - json
    - terminal
    - viewer
install:
    source:
        type: git
        url: https://github.com/antonmedv/fx.git
        ref: main
    steps:
        - git clone https://github.com/antonmedv/fx.git .
        - go build -o bin/fx
    binaries:
        - bin/fx
    additional-config:
        - filename: config.sh
          content: |
            #!/usr/bin/env bash

            export FX_SHOW_SIZE=true
            export FX_THEME=3
