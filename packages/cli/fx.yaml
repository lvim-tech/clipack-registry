name: fx
version: 36.0.4
commit: 2ac1b687bbae30bff61567c627deb8b623b89955
description: Terminal JSON viewer & processor
homepage: https://github.com/antonmedv/fx
license: MIT
maintainer: antonmedv
updated_at: "2025-06-23T00:01:55Z"
tags:
    - cli
    - json
    - terminal
    - viewer
install:
    source:
        type: git
        url: https://github.com/antonmedv/fx.git
        ref: main
    steps:
        - git clone https://github.com/antonmedv/fx.git .
        - go build -o bin/fx
    binaries:
        - bin/fx
    additional-config:
        - filename: config.sh
          content: |
            #!/usr/bin/env bash

            export FX_SHOW_SIZE=true
            export FX_THEME=3
